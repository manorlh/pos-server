version: '3.8'

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: pos-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pos-network
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: pos-mqtt-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - pos-network
    restart: unless-stopped

  # ── Server (FastAPI) ─────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pos-server
    env_file: ./server/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - mqtt
    networks:
      - pos-network
    restart: unless-stopped

  # ── Client (Next.js) ─────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: pos-client
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - pos-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  pos-network:
    driver: bridge
